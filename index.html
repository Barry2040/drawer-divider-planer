<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Drawer Dividers - Pro Planner V6.1</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #2c3e50; }
        #ui-panel { position: absolute; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 12px; width: 340px; max-height: 90vh; overflow-y: auto; z-index: 10; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
        .input-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-weight: bold; font-size: 13px; }
        .num-input { width: 60px; padding: 4px; border: 1px solid #bdc3c7; border-radius: 4px; text-align: right; }
        input[type="range"] { width: 100%; margin-top: 8px; }
        .checkbox-group { background: #ecf0f1; padding: 10px; border-radius: 6px; margin-top: 10px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 10px; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-hor { background: #3498db; }
        .btn-ver { background: #e67e22; }
        .wall-control { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-top: 10px; border-left: 4px solid #bdc3c7; position: relative; }
        .del-btn { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; border: none; border-radius: 4px; padding: 2px 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h2>📐 Schubladen Planer V6.1</h2>
    <div class="input-row"><label>Breite (X):</label><div><input type="number" id="numX" class="num-input" value="400"> mm</div></div>
    <input type="range" id="drawerX" min="100" max="800" value="400">
    <div class="input-row"><label>Tiefe (Y):</label><div><input type="number" id="numY" class="num-input" value="500"> mm</div></div>
    <input type="range" id="drawerY" min="100" max="800" value="500">
    
    <div class="checkbox-group">
        <label style="font-size:13px; font-weight:bold;">Verbinder-Typ:</label>
        <select id="selConnectorType" style="width:100%; margin-top:8px;">
            <option value="cross">Kreuz-Verbinder</option>
            <option value="t_piece">T-Verbinder</option>
            <option value="corner">L-Winkel</option>
            <option value="end">Endstück</option>
        </select>
    </div>

    <div class="btn-group">
        <button class="btn-hor" id="addHWall">+ Horiz. Wand</button>
        <button class="btn-ver" id="addVWall">+ Vert. Wand</button>
    </div>
    <div id="wallsContainer"></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" }}
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 3000);
    camera.position.set(0, 800, 600);
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const systemGroup = new THREE.Group();
    scene.add(systemGroup);

    // Placeholder Logik - Wird ab jetzt modular erweitert
    function buildSystem() {
        systemGroup.clear();
        // Hier bauen wir die Geometrie für Verbinder und Raster auf
    }

    // Event Listener für UI
    document.getElementById('numX').addEventListener('change', buildSystem);
    document.getElementById('drawerX').addEventListener('input', (e) => {
        document.getElementById('numX').value = e.target.value;
        buildSystem();
    });

    buildSystem();
    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
    animate();
</script>
</body>
</html>
